version: 2

models:
  - name: dim_channels
    description: "Channel dimension containing metadata and analytics per Telegram channel"
    columns:
      - name: channel_key
        description: "Surrogate key for the channel (MD5 hash of channel_name)"
        data_tests:
          - unique
          - not_null
      - name: channel_name
        description: "Lowercase normalized channel name"
        data_tests:
          - unique
          - not_null
      - name: channel_type
        description: "Classified type: Pharmaceutical, Cosmetics, Medical, or Other"
        data_tests:
          - not_null
          - accepted_values:
              values: ['Pharmaceutical', 'Cosmetics', 'Medical', 'Other']
      - name: first_post_date
        description: "Date of the earliest scraped message from this channel"
      - name: last_post_date
        description: "Date of the most recent scraped message from this channel"
      - name: total_posts
        description: "Total number of messages scraped from this channel"
      - name: avg_views
        description: "Average number of views per message in this channel"

  - name: dim_dates
    description: "Date dimension table providing calendar attributes for analytical queries"
    columns:
      - name: date_key
        description: "Integer date key in YYYYMMDD format"
        data_tests:
          - unique
          - not_null
      - name: full_date
        description: "Full calendar date"
        data_tests:
          - not_null
      - name: day_of_week
        description: "Day of week (0=Sunday, 6=Saturday)"
      - name: day_name
        description: "Full name of the day (e.g. Monday)"
      - name: week_of_year
        description: "ISO week number of the year"
      - name: month
        description: "Month number (1-12)"
      - name: month_name
        description: "Full name of the month (e.g. January)"
      - name: quarter
        description: "Quarter number (1-4)"
      - name: year
        description: "Calendar year"
      - name: is_weekend
        description: "Boolean flag: TRUE if the date falls on Saturday or Sunday"

  - name: fct_messages
    description: "Central fact table of Telegram messages with FK references to dimensions"
    columns:
      - name: message_id
        description: "Original message identifier from Telegram"
        data_tests:
          - not_null
      - name: channel_key
        description: "Foreign key to dim_channels"
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_channels')
              field: channel_key
      - name: date_key
        description: "Foreign key to dim_dates"
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_dates')
              field: date_key
      - name: view_count
        description: "Number of views for this message"
      - name: forward_count
        description: "Number of times the message was forwarded"
      - name: has_image
        description: "True if an image was downloaded for this message"
      - name: message_length
        description: "Character length of the message text"

  - name: fct_image_detections
    description: "Image detection results from YOLO, joined with message facts"
    columns:
      - name: message_id
        description: "Foreign key to fct_messages"
        data_tests:
          - not_null
      - name: channel_key
        description: "Foreign key to dim_channels"
        data_tests:
          - not_null
      - name: detected_class
        description: "YOLO detected object class name"
      - name: confidence_score
        description: "Detection confidence between 0 and 1"
      - name: image_category
        description: "Classified category: promotional, product_display, lifestyle, or other"
        data_tests:
          - accepted_values:
              values: ['promotional', 'product_display', 'lifestyle', 'other']
